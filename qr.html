<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Otwórzcie mnie 🎁</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-1: #07060a;
    --bg-2: #1a0a1e;
    --bg-3: #240c2a;
    --gold: #d4af37;
    --gold-light: #fff0a8;
    --pink: #ff5a7a;
    --pink-deep: #c5283d;
    --text: #f7f1e3;
    --text-2: #c8bfa8;
    --text-dim: #837a66;
    --card: rgba(20,15,26,0.78);
    --border: rgba(212,175,55,0.32);
  }
  html, body {
    width: 100%; min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(255,90,122,0.18) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 80%, rgba(212,175,55,0.14) 0%, transparent 45%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body {
    min-height: 100vh;
    padding: 2rem 1rem 3rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative;
  }

  /* Twinkling stars in background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 18%, white, transparent),
      radial-gradient(1px 1px at 28% 8%,  rgba(255,255,255,0.7), transparent),
      radial-gradient(1.5px 1.5px at 42% 28%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 55% 14%, white, transparent),
      radial-gradient(2px 2px at 68% 22%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 82% 12%, white, transparent),
      radial-gradient(1.5px 1.5px at 92% 35%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 8% 56%,  rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 35% 72%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 78% 65%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 18% 88%, rgba(255,255,255,0.5), transparent);
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 0.35; }
  }

  /* Header — small mystery tag */
  .tag {
    position: relative; z-index: 2;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.6rem, 1.5vw, 0.78rem);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    text-align: center;
    animation: pulse-tag 2.4s ease-in-out infinite;
  }
  @keyframes pulse-tag {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }
  .tag span { margin: 0 0.3em; }

  /* Big surprise headline */
  .headline {
    position: relative; z-index: 2;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: clamp(2.2rem, 9vw, 3.6rem);
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #fff5d0 0%, var(--gold) 50%, #8a6f24 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 6px 30px rgba(212,175,55,0.4);
    text-align: center;
    line-height: 0.95;
    margin-bottom: 0.2em;
  }

  /* Names — primary recipients */
  .names {
    position: relative; z-index: 2;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    letter-spacing: -0.005em;
    color: var(--pink);
    text-shadow: 0 4px 20px rgba(255,90,122,0.4);
    margin-bottom: 1.3rem;
    text-align: center;
  }
  .names .amp { color: var(--gold); font-style: italic; padding: 0 0.15em; }

  /* QR card */
  .qr-wrap {
    position: relative; z-index: 2;
    margin-bottom: 1.4rem;
  }
  .qr-card {
    background: #fff;
    padding: 22px;
    border-radius: 18px;
    box-shadow:
      0 30px 70px rgba(0,0,0,0.6),
      0 0 0 1px var(--border),
      0 0 80px rgba(212,175,55,0.18),
      0 0 40px rgba(255,90,122,0.15);
    position: relative;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  /* Corner sparkles around card */
  .qr-wrap::before,
  .qr-wrap::after {
    content: '✨';
    position: absolute;
    font-size: 1.5rem;
    animation: spark-pulse 2.4s ease-in-out infinite;
    z-index: 3;
  }
  .qr-wrap::before { top: -8px; left: -8px; }
  .qr-wrap::after  { bottom: -4px; right: -4px; animation-delay: 1.2s; }
  @keyframes spark-pulse {
    0%, 100% { transform: scale(1) rotate(0deg);   opacity: 0.6; }
    50%      { transform: scale(1.3) rotate(15deg); opacity: 1; }
  }
  .qr-card canvas, .qr-card img {
    display: block;
    width: clamp(220px, 70vw, 320px);
    height: clamp(220px, 70vw, 320px);
  }

  /* Mystery message — handwritten */
  .msg {
    position: relative; z-index: 2;
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(1.4rem, 5vw, 1.9rem);
    line-height: 1.2;
    color: var(--text);
    text-align: center;
    margin-bottom: 0.4rem;
    max-width: 480px;
  }
  .msg em { color: var(--pink); font-style: italic; }

  /* CTA — now a clickable link */
  .cta {
    position: relative; z-index: 2;
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.78rem, 2.4vw, 1rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    padding: 14px 24px;
    border: 1.5px solid var(--gold);
    border-radius: 999px;
    background: rgba(212,175,55,0.08);
    margin-top: 0.4rem;
    text-decoration: none;
    cursor: pointer;
    animation: cta-glow 2.4s ease-in-out infinite;
    transition: transform 0.15s ease, background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:hover { background: rgba(212,175,55,0.18); }
  .cta:active { transform: scale(0.97); }
  .cta-tap {
    margin-top: 0.6rem;
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: clamp(0.95rem, 3vw, 1.2rem);
    color: var(--text-2);
    text-align: center;
    z-index: 2;
    position: relative;
  }
  .cta-tap em { font-style: italic; color: var(--gold); }
  @keyframes cta-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); }
    50%      { box-shadow: 0 0 20px 4px rgba(212,175,55,0.25); }
  }
  .cta .arrow { display: inline-block; animation: arrow-bob 1.4s ease-in-out infinite; margin-left: 6px; }
  @keyframes arrow-bob {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(4px); }
  }

  /* Hint */
  .hint {
    position: relative; z-index: 2;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.62rem, 1.6vw, 0.72rem);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 1.2rem;
    text-align: center;
    opacity: 0.75;
  }

  /* filipOS signature — at the bottom, tiny */
  .sig {
    position: relative; z-index: 2;
    margin-top: 2.2rem;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.5rem, 1.1vw, 0.62rem);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,245,225,0.4);
    text-align: center;
  }
  .sig .brand {
    font-family: 'Syne', sans-serif;
    font-style: italic;
    font-weight: 800;
    color: var(--gold);
    text-transform: none;
    letter-spacing: -0.01em;
    margin: 0 0.4em;
    opacity: 0.7;
  }

  /* Floating sparkles particles */
  .float-stars {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .float-stars span {
    position: absolute;
    color: var(--gold-light);
    opacity: 0;
    animation: float-star linear infinite;
  }
  @keyframes float-star {
    0%   { transform: translateY(0)    rotate(0deg);  opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="float-stars" id="floatStars"></div>

<div class="tag"><span>✦</span> WIADOMOŚĆ SPECJALNA <span>✦</span></div>

<div class="headline">NIESPODZIANKA</div>

<div class="names">FILIP <span class="amp">&amp;</span> JUSTYNA</div>

<div class="qr-wrap">
  <div class="qr-card">
    <div id="qrcode"></div>
  </div>
</div>

<div class="msg">coś na Was czeka...<br>otwórz, żeby zobaczyć <em>co to</em> 🎁</div>

<a class="cta" href="https://filiplovejustyna.vercel.app" target="_blank" rel="noopener">
  zeskanuj telefonem <span class="arrow">→</span>
</a>
<div class="cta-tap">…albo <em>kliknij tutaj</em> ☝️</div>

<div class="hint">tylko dla Filipa &amp; Justyny</div>

<div class="sig">
  z miłością ·
  <span class="brand">filipOS</span>
  · 2026
</div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script>
  const QR_URL = 'https://filiplovejustyna.vercel.app';
  const container = document.getElementById('qrcode');
  new QRCode(container, {
    text: QR_URL,
    width: 320,
    height: 320,
    colorDark: '#1a0e08',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Floating sparkle particles
  (function(){
    const layer = document.getElementById('floatStars');
    if (!layer) return;
    const symbols = ['✦', '★', '✨', '·', '⋆'];
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('span');
      s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      s.style.left = (Math.random() * 100) + 'vw';
      s.style.top = (100 + Math.random() * 20) + 'vh';
      s.style.fontSize = (8 + Math.random() * 14) + 'px';
      s.style.animationDuration = (12 + Math.random() * 14) + 's';
      s.style.animationDelay = (-Math.random() * 18) + 's';
      s.style.opacity = '0';
      layer.appendChild(s);
    }
  })();
</script>

</body>
</html>
